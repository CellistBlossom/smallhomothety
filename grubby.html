<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <title>Adopt-a-Grub</title>
  <link rel="stylesheet" href="stylesheet.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans&family=Playpen+Sans&display=swap" rel="stylesheet">
  <link rel="apple-touch-icon" sizes="57x57" href="favicon/apple-icon-57x57.png">
  <link rel="apple-touch-icon" sizes="60x60" href="favicon/apple-icon-60x60.png">
  <link rel="apple-touch-icon" sizes="72x72" href="favicon/apple-icon-72x72.png">
  <link rel="apple-touch-icon" sizes="76x76" href="favicon/apple-icon-76x76.png">
  <link rel="apple-touch-icon" sizes="114x114" href="favicon/apple-icon-114x114.png">
  <link rel="apple-touch-icon" sizes="120x120" href="favicon/apple-icon-120x120.png">
  <link rel="apple-touch-icon" sizes="144x144" href="favicon/apple-icon-144x144.png">
  <link rel="apple-touch-icon" sizes="152x152" href="favicon/apple-icon-152x152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-icon-180x180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="favicon/android-icon-192x192.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="96x96" href="favicon/favicon-96x96.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
  <link rel="manifest" href="favicon/manifest.json">
  <meta name="msapplication-TileColor" content="#ffffff">
  <meta name="msapplication-TileImage" content="favicon/ms-icon-144x144.png">
  <meta name="theme-color" content="#ffffff">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
  <meta name="description"
    content="Adopt-a-Grub is a cute random generator that lets you adopt a grub from Hollow Knight as your very own.">
  <!-- for discord embeds-->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Grubby" />
  <meta property="og:description" content="Adopt-a-Grub" />
  <meta property="og:url" content="https://www.smallhomothetyorganization.org/grubby" />
  <meta property="og:image" itemprop="image primaryImageOfPage"
    content="https://www.smallhomothetyorganization.org/images/grubby.png" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style media="screen">
    .certificate h2 {
      font-size: 22px;
      font-family: "Playpen Sans", sans-serif;
    }

    h3 {
      font-size: 18px;
      font-family: "Playpen Sans", sans-serif;
    }

    #idk_your_id_here {
      font-family: "Josefin Sans", sans-serif;
      font-size: 30px;
      color: #ff92bf;
      background-color: #ddd;
      padding: 10px;
      border-radius: 30px;
    }

    .upside-down {
      transform: scaleY(-1);
    }

    .rightside-up {
      transform: scaleY(1);
    }

    .spinner-slow {
      animation: spin 2s linear infinite;
      width: 150px;
      margin:auto;
    }

    .spinner {
      animation: spin .7s linear infinite;
      width: 150px;
      margin:auto;
    }

    .spinner-fast {
      animation: spin .2s linear infinite;
      width: 150px;
      margin:auto;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    #namelabel {
      font-size: 18px;
      font-family: "Playpen Sans", sans-serif;
    }

    #pronounlabel {
      font-size: 18px;
      font-family: "Playpen Sans", sans-serif;
    }

    #foodlabel {
      font-size: 18px;
      font-family: "Playpen Sans", sans-serif;
    }

    #personalitylabel {
      font-size: 18px;
      font-family: "Playpen Sans", sans-serif;
    }

    #congrats {
      font-size: 18px;
      font-family: "Playpen Sans", sans-serif;
    }
  </style>
</head>

<body>
  <script>
    $(document).ready(function () {
      $("#navbar").load("nav.html");
    });
  </script>
  <div id="navbar">
  </div>
  <div class="subnavmenu">
    <button class="submenubtn" onclick="location.href='/grubby'"><a href="/grubby">Adopt-a-Grub</a></button>
    <button class="submenubtn" onclick="location.href='/grubby/randomgruborder'"><a
        href="/grubby/randomgruborder">Elegy% Random Grub Order</a> </button>
    <button class="submenubtn" onclick="location.href='/grubby/randomgrubDancesquare'"><a
        href="/grubby/randomgrubDancesquare">Random grubDance Square</a> </button>
    <button class="submenubtn" onclick="location.href='/grubby/gonzo-the-grub'"><a href="/grubby/gonzo-the-grub">The
        Glorious Quest of Gonzo the Grub</a> </button>
    <button class="submenubtn" onclick="location.href='/grubby/petthegrub'"><a href="/grubby/petthegrub">Pet the
        Grub</a> </button>
    <button class="submenubtn" onclick="location.href='https://picrew.me/en/image_maker/2595849'"><a
        href="https://picrew.me/image_maker/2595849">Build-a-Grub (Picrew)</a></button>
  </div>
  <div id="main-container">
    <h1 id="header">Adopt-a-Grub</h1>
    <div id="body">
      <div id="certificate">
        <h2 id="namelabel"></h2>
        <p id="grubname"></p>

        <h2 id="pronounlabel"></h2>
        <p id="pronouns"></p>

        <h2 id="foodlabel"></h2>
        <p id="food"></p>

        <h2 id="personalitylabel"></h2>
        <p id="personality"></p>

        <h3 id="congrats"></h3>

        <div id="grubbyimage">

        </div>
        <script src="scripts/grubby.js"></script>
      </div>
      <br>
      <p>Note: You may need to click download twice to download the correct grub's certificate</p>
      <br>
      <div id="html-content-holder"
          style="background-color: AntiqueWhite;
          color: black; 
          width: 500px;
          padding-left: 25px;
          padding-top: 10px;
          margin: auto;">
        <strong style="font-family: 'Papyrus'">CERTIFICATE OF ADOPTION</strong>
        <p id="currentdate"></p>
        <p id="grubcertificatename"></p>
        <p id="grubimage"></p>
        <p id="grubfact"></p>
        <br>
      </div>
      <br>
      <a id="btn-Convert-Html2Image" href="#">Download</a>
      <br>
      <br>
      <br>
      <script>
        $(document).ready(function () {

          let element = document.getElementById("html-content-holder");
          let getCanvas;

          $("#btn-Convert-Html2Image").on('click', function () {
            html2canvas(element).then(function (canvas) {
              getCanvas = canvas;
            });

            let imageData = getCanvas.toDataURL("image/png");

            let newData = imageData.replace(
              /^data:image\/png/,
              "data:application/octet-stream"
            );

            $(this)
              .attr("download", "certificate.png")
              .attr("href", newData);
          });

        });
      </script>
    </div>
    <script>
      $(document).ready(function () {
        $("#footer").load("/footer.html");
      });
    </script>
    <div id="footer"> </div>
  </div>
</body>

</html>
